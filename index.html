<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Envelope Printer</title>
        <link rel="stylesheet" href="public/css/bootstrap/bootstrap.min.css">
        <link rel="stylesheet" href="public/fonts/common/fraunces.css">
        <link rel="stylesheet" href="public/icons/common/bootstrap-icons.css">
        <link rel="stylesheet" href="public/css/app.css">
    </head>
    <body class="bg-body">
        <!-- ============================ Header ============================ -->
        <header class="bg-body-tertiary border-bottom sticky-top">
            <div class="container-fluid d-flex flex-wrap align-items-center gap-2 py-2">
                <span id="brand" class="fw-bold fs-4 me-auto">
                    <i class="bi bi-envelope-paper me-1"></i><span data-i18n="app_title">Envelope Printer</span>
                </span>

                <label class="visually-hidden" for="sizeSelect" data-i18n="env_size">Envelope size</label>
                <select id="sizeSelect" class="form-select form-select-sm w-auto" aria-label="Envelope size">
                    <option value="no10">#10 — 9.5 × 4.125 in</option>
                    <option value="no9">#9 — 8.875 × 3.875 in</option>
                    <option value="monarch">Monarch — 7.5 × 3.875 in</option>
                    <option value="a2">A2 — 5.75 × 4.375 in</option>
                    <option value="dl">DL — 220 × 110 mm</option>
                    <option value="c6">C6 — 162 × 114 mm</option>
                    <option value="c5">C5 — 229 × 162 mm</option>
                    <option value="171x100">Small — 171 × 100 mm 3.94 × 6.73 in</option>
                    <option value="250x112">Long — 250×112 mm 4.41 × 9.84 in</option>
                </select>

                <button type="button" class="btn btn-outline-primary btn-sm" data-action="open-presets">
                    <i class="bi bi-collection me-1"></i><span data-i18n="presets">Presets</span>
                </button>

                <label class="visually-hidden" for="langSelect" data-i18n="lang">Language</label>
                <select id="langSelect" class="form-select form-select-sm w-auto" aria-label="Language"></select>

                <button type="button" class="btn btn-primary btn-sm" data-action="print">
                    <i class="bi bi-printer me-1"></i><span data-i18n="print">Print</span>
                </button>
            </div>
        </header>

        <!-- ====================== Envelope preview ======================= -->
        <main class="container-fluid py-4">
            <div id="envelopePreview" class="d-flex justify-content-center py-2">
                <div id="envelope" class="bg-white border rounded shadow-sm">
                    <div id="envStamp" aria-hidden="true">
                        <i class="bi bi-postage-fill"></i>
                        <span data-corner="tl"></span>
                        <span data-corner="tr"></span>
                        <span data-corner="bl"></span>
                        <span data-corner="br"></span>
                    </div>
                    <div id="envSender" role="button" tabindex="0"
                         data-action="open-slot" data-slot="sender"
                         aria-label="Sender address"></div>
                    <div id="envRecipient" role="button" tabindex="0"
                         data-action="open-slot" data-slot="recipient"
                         aria-label="Recipient address"></div>
                </div>
            </div>
        </main>

        <!-- ===================== Address-book modal ====================== -->
        <!-- Shown/hidden by app.js (vanilla) using Bootstrap's CSS classes. -->
        <div class="modal fade" id="addrModal" tabindex="-1" aria-labelledby="addrModalTitle" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title h5" id="addrModalTitle" data-i18n="saved_addresses">Saved addresses</h2>
                        <button type="button" class="btn-close" data-action="close-modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div id="addrList" class="list-group mb-3"></div>

                        <!-- Add / edit form (revealed via the "Add new" entry or Edit). -->
                        <div id="addrForm" class="d-none">
                            <hr>
                            <div class="mb-2">
                                <label class="form-label small mb-1" for="addr-name" data-i18n="name">Name</label>
                                <input type="text" class="form-control form-control-sm" id="addr-name" autocomplete="off">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small mb-1" for="addr-address" data-i18n="address">Address</label>
                                <input type="text" class="form-control form-control-sm" id="addr-address" autocomplete="off">
                            </div>
                            <div class="row g-2">
                                <div class="col-7">
                                    <label class="form-label small mb-1" for="addr-city" data-i18n="city">City</label>
                                    <input type="text" class="form-control form-control-sm" id="addr-city" autocomplete="off">
                                </div>
                                <div class="col-5">
                                    <label class="form-label small mb-1" for="addr-state" data-i18n="state">State</label>
                                    <input type="text" class="form-control form-control-sm" id="addr-state" autocomplete="off">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer justify-content-between">
                        <button type="button" id="btnClearSlot" class="btn btn-outline-secondary btn-sm d-none"
                                data-action="clear-slot" data-i18n="clear_slot">Clear this slot</button>
                        <div class="d-flex gap-2 ms-auto">
                            <button type="button" class="btn btn-light btn-sm" data-action="close-modal" data-i18n="close">Close</button>
                            <button type="button" id="btnSaveAddr" class="btn btn-primary btn-sm d-none" data-action="save-address">Save &amp; use</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ======================== Presets modal ======================= -->
        <!-- Shown/hidden by app.js (vanilla) using Bootstrap's CSS classes. -->
        <div class="modal fade" id="presetModal" tabindex="-1" aria-labelledby="presetModalTitle" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title h5" id="presetModalTitle" data-i18n="presets">Presets</h2>
                        <button type="button" class="btn-close" data-action="close-presets" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div id="presetList" class="list-group mb-3"></div>

                        <hr>
                        <label class="form-label small mb-1" for="presetName" data-i18n="save_preset">Save current as preset</label>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control" id="presetName"
                                   data-i18n-ph="preset_name_ph" placeholder="Preset name" autocomplete="off">
                            <button type="button" class="btn btn-primary" data-action="save-preset" data-i18n="save">Save</button>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-light btn-sm" data-action="close-presets" data-i18n="close">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========================== Toast ============================== -->
        <div id="toastWrap" class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="appToast" class="toast align-items-center text-bg-success border-0" role="status" aria-live="polite" aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body" id="appToastBody"></div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-action="close-toast" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <script src="public/js/bootstrap/bootstrap.min.js"></script>
        <script src="public/js/lng/en.js"></script>
        <script src="public/js/lng/eo.js"></script>
        <script src="public/js/lng/es.js"></script>
        <script src="public/js/lng/fr.js"></script>
        <script src="public/js/lng/it.js"></script>
        <script src="public/js/lng/pt.js"></script>
        <script src="public/js/lng/ru.js"></script>
        <script src="public/js/app.js"></script>
    </body>
</html>
